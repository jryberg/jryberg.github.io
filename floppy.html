<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Floppy</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: #000;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  font-family: 'Courier New', Courier, monospace;
}
#wrap {
  position: relative;
  display: inline-block;
}
canvas {
  display: block;
  image-rendering: pixelated;
}
/* CRT scanline overlay */
#wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0,0,0,0.08) 0px,
    rgba(0,0,0,0.08) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
  z-index: 10;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
</div>
<script>
(function() {
'use strict';

var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');

var W, H;

function resize() {
  W = Math.min(580, window.innerWidth - 4);
  H = Math.min(460, window.innerHeight - 4);
  canvas.width = W;
  canvas.height = H;
}
resize();
window.addEventListener('resize', function() {
  resize();
  if (state === 'start') drawStart();
});

// ── Level definitions ─────────────────────────────────────────────────────────
var LEVELS = [
  { gap: 165, speed: 2.0, interval: 125 },  // 1
  { gap: 155, speed: 2.5, interval: 115 },  // 2
  { gap: 145, speed: 3.0, interval: 105 },  // 3
  { gap: 135, speed: 3.5, interval: 97  },  // 4
  { gap: 125, speed: 4.0, interval: 90  },  // 5
  { gap: 115, speed: 4.5, interval: 84  },  // 6+
];
function getLevelDef(lv) { return LEVELS[Math.min(lv - 1, LEVELS.length - 1)]; }

// ── Game state ────────────────────────────────────────────────────────────────
var state; // 'start' | 'playing' | 'dead' | 'levelup'
var score, level, levelupTimer;
var fy, fvy; // floppy y, vertical velocity
var pipes;   // [{x, topH, scored}]
var frameCount, sinceLastPipe;
var levelFlash; // levelup message opacity

var FX = 120;         // floppy fixed x
var FW = 44, FH = 44; // floppy width/height
var GRAVITY = 0.35;
var FLAP = -7;
var HIT_INSET = 7;    // shrink hitbox

// ── Deterministic pseudo-random for background ────────────────────────────────
function dr(s) { var x = Math.sin(s * 127.1 + 311.7) * 43758.5453; return x - Math.floor(x); }

// ── Pre-compute background (circuit board) ────────────────────────────────────
var bgCanvas = document.createElement('canvas');
var bgCtx = bgCanvas.getContext('2d');

function buildBackground() {
  bgCanvas.width = W;
  bgCanvas.height = H;
  var bx = bgCtx;

  // PCB base
  bx.fillStyle = '#0a1a0a';
  bx.fillRect(0, 0, W, H);

  // Horizontal traces
  var numH = 18;
  for (var i = 0; i < numH; i++) {
    var y = dr(i * 3 + 1) * H;
    var len = (0.3 + dr(i * 3 + 2) * 0.5) * W;
    var sx = dr(i * 3 + 3) * (W - len);
    bx.strokeStyle = 'rgba(30,80,30,0.7)';
    bx.lineWidth = 1 + Math.floor(dr(i + 50) * 2);
    bx.beginPath(); bx.moveTo(sx, y); bx.lineTo(sx + len, y); bx.stroke();
  }
  // Vertical traces
  var numV = 12;
  for (var j = 0; j < numV; j++) {
    var x = dr(j * 5 + 7) * W;
    var vlen = (0.2 + dr(j * 5 + 8) * 0.4) * H;
    var sy = dr(j * 5 + 9) * (H - vlen);
    bx.strokeStyle = 'rgba(30,80,30,0.6)';
    bx.lineWidth = 1 + Math.floor(dr(j + 80) * 2);
    bx.beginPath(); bx.moveTo(x, sy); bx.lineTo(x, sy + vlen); bx.stroke();
  }
  // Solder pads (gold dots at trace intersections)
  for (var k = 0; k < 28; k++) {
    var px = dr(k * 7 + 2) * W;
    var py = dr(k * 7 + 3) * H;
    bx.beginPath();
    bx.arc(px, py, 3, 0, Math.PI * 2);
    bx.fillStyle = '#b8920a';
    bx.fill();
    bx.beginPath();
    bx.arc(px, py, 1.5, 0, Math.PI * 2);
    bx.fillStyle = '#d4aa20';
    bx.fill();
  }
  // IC chip silhouettes
  var chips = [
    { x: 40,  y: 60,  w: 50, h: 28 },
    { x: W-100, y: 80,  w: 50, h: 28 },
    { x: 30,  y: H-100, w: 60, h: 22 },
    { x: W-90, y: H-80, w: 40, h: 20 },
  ];
  chips.forEach(function(c) {
    bx.fillStyle = '#0f1a0f';
    bx.fillRect(c.x, c.y, c.w, c.h);
    bx.strokeStyle = '#1e3a1e';
    bx.lineWidth = 1;
    bx.strokeRect(c.x, c.y, c.w, c.h);
    // pins left
    for (var p = 0; p < 4; p++) {
      var py2 = c.y + 4 + p * 6;
      bx.fillStyle = '#6a7a40';
      bx.fillRect(c.x - 5, py2, 5, 3);
    }
    // pins right
    for (var q = 0; q < 4; q++) {
      var py3 = c.y + 4 + q * 6;
      bx.fillStyle = '#6a7a40';
      bx.fillRect(c.x + c.w, py3, 5, 3);
    }
    // label stripe on chip
    bx.fillStyle = '#1a2a1a';
    bx.fillRect(c.x + 2, c.y + 2, c.w - 4, 8);
  });
}

// ── Draw floppy disk ──────────────────────────────────────────────────────────
function drawFloppy(cx, cy, angle) {
  ctx.save();
  ctx.translate(cx + FW / 2, cy + FH / 2);
  ctx.rotate(angle);
  ctx.translate(-FW / 2, -FH / 2);

  var x = 0, y = 0, w = FW, h = FH;
  var r = 4; // corner radius

  // Body shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.roundRect(x + 2, y + 2, w, h, r);
  ctx.fill();

  // Body
  ctx.fillStyle = '#222222';
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
  ctx.fill();

  // Body highlight (top edge)
  ctx.fillStyle = '#383838';
  ctx.beginPath();
  ctx.roundRect(x, y, w, 3, [r, r, 0, 0]);
  ctx.fill();

  // Body outline
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
  ctx.stroke();

  // Label area (top portion)
  var lx = x + 4, ly = y + 4, lw = w - 8, lh = 18;
  ctx.fillStyle = '#e8e8e0';
  ctx.fillRect(lx, ly, lw, lh);

  // Label colored stripes
  var stripeColors = ['#b03030', '#3060b0', '#20882a'];
  stripeColors.forEach(function(col, i) {
    ctx.fillStyle = col;
    ctx.fillRect(lx, ly + lh - 5 + i * 1.5, lw, 2);
  });

  // Label text
  ctx.fillStyle = '#111';
  ctx.font = 'bold 5px "Courier New", monospace';
  ctx.fillText('HD  1.44MB', lx + 2, ly + 9);
  ctx.font = '4px "Courier New", monospace';
  ctx.fillText('DOS FORMAT', lx + 2, ly + 15);

  // Metal shutter slot (center)
  var sx = x + 8, sy = ly + lh + 2, sw = w - 14, sh = 14;
  ctx.fillStyle = '#555560';
  ctx.fillRect(sx, sy, sw, sh);
  // Shutter opening
  ctx.fillStyle = '#111118';
  ctx.fillRect(sx + 2, sy + 2, sw - 4, sh - 4);
  // Shutter highlight
  ctx.fillStyle = '#888890';
  ctx.fillRect(sx, sy, sw, 2);

  // Write-protect notch (top-right corner cutout visual)
  ctx.fillStyle = '#111';
  ctx.fillRect(x + w - 8, y, 6, 6);
  ctx.fillStyle = '#0a1a0a'; // show through to PCB color
  ctx.fillRect(x + w - 7, y + 1, 4, 4);
  // notch hole
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(x + w - 5, y + 3, 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ── Draw ISA expansion card (obstacle) ───────────────────────────────────────
function drawCard(x, y, height, isTop) {
  var w = 52; // card width
  if (height <= 0) return;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(x + 3, y + 3, w, height);

  // Card PCB body
  ctx.fillStyle = '#2e5c2e';
  ctx.fillRect(x, y, w, height);

  // Card edge highlight
  ctx.fillStyle = '#3a7a3a';
  ctx.fillRect(x, y, 2, height);
  ctx.fillStyle = '#1e3e1e';
  ctx.fillRect(x + w - 2, y, 2, height);

  // Bracket (metal strip on the side)
  ctx.fillStyle = '#9a9a8a';
  ctx.fillRect(x + w, y, 6, height);
  ctx.fillStyle = '#c0c0b0';
  ctx.fillRect(x + w, y, 2, height);
  ctx.fillStyle = '#707068';
  ctx.fillRect(x + w + 4, y, 2, height);

  // Components on card (chips)
  var numChips = Math.max(1, Math.floor(height / 40));
  for (var i = 0; i < numChips; i++) {
    var cy2 = y + 10 + i * 36;
    if (cy2 + 20 > y + height - 5) break;
    ctx.fillStyle = '#1a1a18';
    ctx.fillRect(x + 8, cy2, 22, 12);
    ctx.fillStyle = '#2a2a24';
    ctx.fillRect(x + 9, cy2 + 1, 20, 5);
    // pins
    for (var p = 0; p < 4; p++) {
      ctx.fillStyle = '#8a9a50';
      ctx.fillRect(x + 10 + p * 5, cy2 - 2, 2, 3);
      ctx.fillRect(x + 10 + p * 5, cy2 + 12, 2, 3);
    }
    // capacitor nearby
    ctx.fillStyle = '#5a3a10';
    ctx.fillRect(x + 34, cy2, 8, 14);
    ctx.fillStyle = '#7a5a20';
    ctx.fillRect(x + 35, cy2 + 1, 6, 4);
  }

  // ISA connector teeth (at the card edge facing the gap)
  var toothY = isTop ? y + height - 10 : y;
  var toothH = 10;
  var toothW = 4;
  for (var t = 0; t < 10; t++) {
    var tx = x + 2 + t * 5;
    if (tx + toothW > x + w - 4) break;
    ctx.fillStyle = t % 2 === 0 ? '#d0c890' : '#706858';
    ctx.fillRect(tx, toothY, toothW, toothH);
    // gold contact stripe
    if (t % 2 === 0) {
      ctx.fillStyle = '#b8a040';
      ctx.fillRect(tx + 1, toothY + 2, 2, toothH - 4);
    }
  }

  // Card top/bottom border (bracket edge)
  ctx.fillStyle = '#8a8a7a';
  if (isTop) {
    ctx.fillRect(x - 1, y, w + 8, 5);
  } else {
    ctx.fillRect(x - 1, y + height - 5, w + 8, 5);
  }
}

// ── Glowing text helper ───────────────────────────────────────────────────────
function glowText(text, x, y, size, col, glowCol) {
  ctx.font = 'bold ' + size + 'px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.shadowColor = glowCol || col;
  ctx.shadowBlur = 12;
  ctx.fillStyle = col;
  ctx.fillText(text, x, y);
  ctx.shadowBlur = 0;
}

function glowTextLeft(text, x, y, size, col, glowCol) {
  ctx.font = 'bold ' + size + 'px "Courier New", monospace';
  ctx.textAlign = 'left';
  ctx.shadowColor = glowCol || col;
  ctx.shadowBlur = 10;
  ctx.fillStyle = col;
  ctx.fillText(text, x, y);
  ctx.shadowBlur = 0;
}

function glowTextRight(text, x, y, size, col, glowCol) {
  ctx.font = 'bold ' + size + 'px "Courier New", monospace';
  ctx.textAlign = 'right';
  ctx.shadowColor = glowCol || col;
  ctx.shadowBlur = 10;
  ctx.fillStyle = col;
  ctx.fillText(text, x, y);
  ctx.shadowBlur = 0;
}

// ── Draw UI overlay ───────────────────────────────────────────────────────────
function drawUI() {
  glowTextLeft('LVL: ' + level, 10, 28, 14, '#44ff44', '#00ff00');
  glowTextRight('SCORE: ' + score, W - 10, 28, 14, '#44ff44', '#00ff00');
}

// ── Pipe/card helpers ─────────────────────────────────────────────────────────
var CARD_W = 58; // visual width including bracket

function addPipe() {
  var def = getLevelDef(level);
  var minTop = 60;
  var maxTop = H - def.gap - 60;
  var topH = minTop + Math.random() * (maxTop - minTop);
  pipes.push({ x: W, topH: topH, scored: false });
}

function updatePipes() {
  var def = getLevelDef(level);
  sinceLastPipe++;
  if (sinceLastPipe >= def.interval) {
    addPipe();
    sinceLastPipe = 0;
  }
  for (var i = pipes.length - 1; i >= 0; i--) {
    pipes[i].x -= def.speed;
    if (pipes[i].x + CARD_W < 0) {
      pipes.splice(i, 1);
      continue;
    }
    // Score
    if (!pipes[i].scored && pipes[i].x + CARD_W < FX) {
      pipes[i].scored = true;
      score++;
      // Level up every 5 points
      if (score > 0 && score % 5 === 0) {
        var newLevel = Math.floor(score / 5) + 1;
        if (newLevel > level) {
          level = newLevel;
          state = 'levelup';
          levelupTimer = 90; // ~1.5 seconds at 60fps
        }
      }
    }
  }
}

function drawPipes() {
  var def = getLevelDef(level);
  pipes.forEach(function(p) {
    drawCard(p.x, 0, p.topH, true);
    drawCard(p.x, p.topH + def.gap, H - p.topH - def.gap, false);
  });
}

// ── Collision detection ───────────────────────────────────────────────────────
function checkCollision() {
  var def = getLevelDef(level);
  var fx1 = FX + HIT_INSET;
  var fy1 = fy + HIT_INSET;
  var fx2 = FX + FW - HIT_INSET;
  var fy2 = fy + FH - HIT_INSET;

  // Floor and ceiling
  if (fy1 < 0 || fy2 > H) return true;

  for (var i = 0; i < pipes.length; i++) {
    var p = pipes[i];
    var px1 = p.x;
    var px2 = p.x + CARD_W;
    if (fx2 < px1 || fx1 > px2) continue;
    // Top card
    if (fy1 < p.topH) return true;
    // Bottom card
    if (fy2 > p.topH + def.gap) return true;
  }
  return false;
}

// ── Screens ───────────────────────────────────────────────────────────────────
function drawStart() {
  // Background
  ctx.drawImage(bgCanvas, 0, 0);

  // Dim overlay
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  // Title panel
  var pw = 320, ph = 180;
  var px = (W - pw) / 2, py = (H - ph) / 2 - 20;
  ctx.fillStyle = 'rgba(0,20,0,0.85)';
  ctx.strokeStyle = '#00aa00';
  ctx.lineWidth = 2;
  ctx.fillRect(px, py, pw, ph);
  ctx.strokeRect(px, py, pw, ph);
  // inner border
  ctx.strokeStyle = '#005500';
  ctx.lineWidth = 1;
  ctx.strokeRect(px + 3, py + 3, pw - 6, ph - 6);

  // Floppy preview
  drawFloppy(W / 2 - FW / 2, py + 18, 0);

  glowText('Floppy', W / 2, py + 90, 26, '#66ff66', '#00ff00');
  glowText('v1.0', W / 2, py + 112, 12, '#339933', '#00aa00');

  ctx.font = '11px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#00ff00';
  ctx.shadowBlur = 6;

  // Blinking PRESS SPACE text
  if (Math.floor(Date.now() / 500) % 2 === 0) {
    ctx.fillStyle = '#aaffaa';
    ctx.fillText('PRESS SPACE TO BOOT', W / 2, py + ph - 22);
  }
  ctx.shadowBlur = 0;

  // Small instructions
  ctx.fillStyle = '#336633';
  ctx.font = '9px "Courier New", monospace';
  ctx.fillText('SPACE / CLICK to flap', W / 2, py + ph + 20);
  ctx.fillText('Navigate through expansion cards', W / 2, py + ph + 33);
}

function drawDead() {
  // Draw last game frame (pipes already drawn in game loop)
  // Overlay
  ctx.fillStyle = 'rgba(80,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);

  var pw = 300, ph = 150;
  var px = (W - pw) / 2, py = (H - ph) / 2 - 10;
  ctx.fillStyle = 'rgba(20,0,0,0.9)';
  ctx.strokeStyle = '#ff2200';
  ctx.lineWidth = 2;
  ctx.fillRect(px, py, pw, ph);
  ctx.strokeRect(px, py, pw, ph);
  ctx.strokeStyle = '#660000';
  ctx.lineWidth = 1;
  ctx.strokeRect(px + 3, py + 3, pw - 6, ph - 6);

  glowText('** SYSTEM CRASH **', W / 2, py + 35, 14, '#ff4444', '#ff0000');
  glowText('SCORE: ' + score, W / 2, py + 62, 14, '#ff8844', '#ff4400');
  glowText('LVL: ' + level, W / 2, py + 84, 12, '#ff6633', '#ff3300');

  if (Math.floor(Date.now() / 500) % 2 === 0) {
    ctx.font = '11px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 6;
    ctx.fillStyle = '#ffaaaa';
    ctx.fillText('PRESS SPACE TO REBOOT', W / 2, py + ph - 18);
    ctx.shadowBlur = 0;
  }
}

function drawLevelUp() {
  if (levelFlash > 0) {
    var alpha = Math.min(1, levelFlash / 30);
    ctx.save();
    ctx.globalAlpha = alpha;
    glowText('LEVEL ' + level + '!', W / 2, H / 2 - 10, 22, '#ffff44', '#ffaa00');
    glowText('SPEED INCREASED', W / 2, H / 2 + 18, 13, '#ffcc44', '#ff8800');
    ctx.restore();
  }
}

// ── Game init / reset ─────────────────────────────────────────────────────────
function initGame() {
  score = 0;
  level = 1;
  fy = H / 2 - FH / 2;
  fvy = 0;
  pipes = [];
  frameCount = 0;
  sinceLastPipe = 60; // delay first pipe slightly
  levelupTimer = 0;
  levelFlash = 0;
}

// ── Main game loop ────────────────────────────────────────────────────────────
var lastTime = 0;

function loop(ts) {
  requestAnimationFrame(loop);

  if (state === 'start') {
    drawStart();
    return;
  }

  // Draw background
  ctx.drawImage(bgCanvas, 0, 0);

  if (state === 'playing' || state === 'levelup') {
    // Physics
    if (state === 'playing') {
      fvy += GRAVITY;
      fy += fvy;
    } else {
      // During level-up: floppy hovers (slight float)
      levelupTimer--;
      levelFlash = levelupTimer;
      if (levelupTimer <= 0) state = 'playing';
      // gentle gravity still
      fvy += GRAVITY * 0.3;
      fy += fvy;
    }

    // Clamp velocity
    if (fvy > 10) fvy = 10;

    // Update and draw pipes
    if (state === 'playing') updatePipes();
    drawPipes();

    // Draw floppy
    var angle = Math.max(-0.4, Math.min(0.4, fvy * 0.06));
    drawFloppy(FX, fy, angle);

    if (state === 'levelup') drawLevelUp();

    // Collision (only when playing, not during level-up freeze moment)
    if (state === 'playing' && checkCollision()) {
      state = 'dead';
    }

    drawUI();

  } else if (state === 'dead') {
    drawPipes();
    drawFloppy(FX, fy, 0.5); // tilted on crash
    drawUI();
    drawDead();
  }
}

// ── Input ─────────────────────────────────────────────────────────────────────
function flap() {
  if (state === 'start' || state === 'dead') {
    initGame();
    state = 'playing';
    return;
  }
  if (state === 'playing') {
    fvy = FLAP;
  }
}

document.addEventListener('keydown', function(e) {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.key === ' ') {
    e.preventDefault();
    flap();
  }
});
document.addEventListener('mousedown', function(e) {
  e.preventDefault();
  flap();
});
document.addEventListener('touchstart', function(e) {
  e.preventDefault();
  flap();
}, { passive: false });

// ── Boot ──────────────────────────────────────────────────────────────────────
buildBackground();
state = 'start';
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
